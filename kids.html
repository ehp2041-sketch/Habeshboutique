<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kid's Collection - DJ ENO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            /* Black & White ዘይኮነ ሕብራዊ Gradient */
            background: linear-gradient(-45deg, #e9d3c0, #9dbbae, #ee4432, #3e3433);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: white;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Header Design */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .header h2 {
            font-family: 'Orbitron', sans-serif;
            color: #d4af37;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .back-btn {
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Product Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Mobile friendly */
            gap: 15px;
            padding: 20px;
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            transition: 0.4s;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: #d4af37;
            background: rgba(255, 255, 255, 0.07);
        }

        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
            cursor: pointer;
        }

        .product-name {
            font-size: 0.9rem;
            margin-top: 10px;
            color: #ccc;
        }

        .product-price {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            color: #d4af37;
            margin: 8px 0;
        }

        .buy-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(45deg, #d4af37, #f1c40f);
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html" class="back-btn">← BACK</a>
        <h2>Kid'S ELITE</h2>
        <div style="font-size: 1.5rem;">🛒</div>
    </div>

    <div class="grid" id="kids-grid">
        </div>

    <script>
        const grid = document.getElementById('kids-grid');
        
        // ስማት ስእልታትካ ኣብዚ ጽሓፍ (ንኣብነት men_500_1.jpg)
        const images = [
            'kids_900_1.jpg', 
            'kids_700_2.jpg', 
            'kids_850_3.jpg',
            'kids_1200_4.jpg'
        ];

        images.forEach(imgName => {
            // ካብ ስም እቲ ስእሊ ነቲ ዋጋ ይወስድ (EGP ጌርናዮ ኣለና)
            const parts = imgName.split('_');
            const price = parts[1] || "0";

            grid.innerHTML += `
                <div class="product-card">
                    <img src="assets/${imgName}" alt="Men Fashion" onclick="window.open(this.src)">
                    <div class="product-name">Elite Design</div>
                    <div class="product-price">${price} EGP</div>
                    <button class="buy-btn">Add to Cart</button>
                </div>
            `;
        });
    </script>

</body>
</html>
