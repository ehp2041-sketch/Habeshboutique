<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DJ ENO Elite Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: #0f0f0f;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            color: #d4af37;
            margin-bottom: 30px;
            letter-spacing: 3px;
            font-size: 1.8rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #d4af37;
            background: rgba(255, 255, 255, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #d4af37;
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
            background: #f1c40f;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>DJ ENO ELITE</h2>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="Username" autocomplete="off">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>

        <button type="button" class="login-btn" onclick="checklogin()">LOGIN</button>

        <p class="footer-text">Protected by DJ ENO Elite Security</p>
    </div>

    <script>
        function checklogin() {
            // 1. Inputs ንውሰድ
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            // 2. Logic Check (aman / 1234)
            if (user === "aman" && pass === "1234") {
                alert("CONGRA! ብሰላም መጻእካ።");
                window.location.href = "home.html"; 
            } else {
                alert("NONE! ጌጋ ኣሎ፣ እንደገና ፈትን።");
            }
        }

        // Enter ምስ ትጠውቕ እውን Login ንኽሰርሕ
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checklogin();
            }
        });
    </script>

</body>
</html>
